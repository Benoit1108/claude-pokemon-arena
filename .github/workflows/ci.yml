name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Pipeline shape (mirrors GitLab-style stages, fail-fast across stages) :
#
#   security  ──┐
#               ├──► quality (parallel: lint / prettier / typecheck / knip / i18n) ──► test ──► build
#   (none)    ──┘
#
# - All jobs use Node 22 (eslint-flat-config-utils calls Object.groupBy, Node 21+).
# - All jobs check out the submodule (vendor/claude-pokemon hosts the shared package).
# - npm cache via actions/setup-node makes per-job `npm ci` ~5s after the first one.
#
# Why we don't share node_modules via artifacts : GitHub Actions cache is already
# warm enough at our scale, and artifact upload/download would slow us down more
# than it saves install time.

env:
  NODE_VERSION: '22'

jobs:
  # ─── Stage : security ─────────────────────────────────────────────────────
  security:
    name: 🔒 npm audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: npm audit (prod deps, high+)
        run: npm run check:audit

  # ─── Stage : quality (5 jobs in parallel after security) ──────────────────
  lint:
    name: 🐛 ESLint
    needs: security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with: { submodules: true }
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm ci
      - run: npm run lint

  prettier:
    name: 💅 Prettier check
    needs: security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with: { submodules: true }
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm ci
      - run: npm run format:check

  typecheck:
    name: 🚨 TypeScript typecheck
    needs: security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with: { submodules: true }
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm ci
      - run: npm run typecheck

  knip:
    name: 🔍 Dead code (knip)
    needs: security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with: { submodules: true }
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm ci
      - run: npm run knip

  i18n-parity:
    name: 🌍 i18n FR/EN key parity
    needs: security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with: { submodules: true }
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm ci
      - run: npm run check:i18n

  # ─── Stage : test (after all quality gates) ───────────────────────────────
  test:
    name: ✅ Vitest + coverage (threshold 80%)
    needs: [lint, prettier, typecheck, knip, i18n-parity]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with: { submodules: true }
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm ci
      - run: npm run test:coverage

  # ─── Stage : build (after test passes) ────────────────────────────────────
  build:
    name: 📦 Nuxt build (cloudflare-pages preset)
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with: { submodules: true }
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm ci
      - name: Build for Cloudflare Pages
        env:
          NITRO_PRESET: cloudflare-pages
        run: npm run build
      - name: Verify dist output
        run: |
          test -d dist || (echo "::error::dist/ not generated" && exit 1)
          test -f dist/_redirects || echo "::warning::dist/_redirects missing"
          ls -la dist/ | head -20
